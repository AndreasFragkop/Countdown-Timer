
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff0000 0%, #ff5100 100%);
            margin: 0;
            padding: 50px;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        input {
            padding: 15px;
            font-size: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 100px;
            text-align: center;
            margin: 10px;
        }
        
        button {
            padding: 15px 25px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .start-btn {
            background-color: #4CAF50;
            color: white;
        }
        
        .start-btn:hover {
            background-color: #45a049;
        }
        
        .stop-btn {
            background-color: #f44336;
            color: white;
        }
        
        .stop-btn:hover {
            background-color: #da190b;
        }
        
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            color: #2c3e50;
            margin: 30px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 15px;
        }
        
        .finished {
            color: #e74c3c !important;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Countdown Timer</h1>
        
        <div class="input-section">
            <input type="number" id="secondsInput" placeholder="60" value="10">
            <br>
            <label>Enter seconds</label>
        </div>
        
        <button class="start-btn" onclick="startTimer()">Start Timer</button>
        <button class="stop-btn" onclick="stopTimer()">Stop Timer</button>
        
        <div id="display" class="timer-display">00:00</div>
        
        <div id="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
