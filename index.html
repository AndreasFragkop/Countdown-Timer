
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="app-shell">
        <section class="container" id="timerCard">
            <!-- Main app title -->
            <h1>Countdown timer</h1>

            <!-- Live countdown display and progress indicator -->
            <div class="timer-display-wrap">
                <div id="display" class="timer-display">00:00</div>
                <div class="progress" aria-hidden="true">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p class="display-caption">Hours : Minutes : Seconds</p>
            </div>

            <!-- Shortcut durations for common timer values -->
            <div class="preset-section">
                <p class="field-label">Quick presets</p>
                <div class="presets">
                    <button class="preset-chip" id="preset30" type="button" data-seconds="30">30s</button>
                    <button class="preset-chip" id="preset60" type="button" data-seconds="60">1m</button>
                    <button class="preset-chip" id="preset300" type="button" data-seconds="300">5m</button>
                    <button class="preset-chip" id="preset600" type="button" data-seconds="600">10m</button>
                    <button class="preset-chip" id="preset3600" type="button" data-seconds="3600">1h</button>
                </div>
            </div>

            <!-- Manual duration inputs -->
            <div class="input-section">
                <p class="field-label">Set duration</p>
                <div class="time-inputs">
                    <div class="time-field">
                        <label for="hoursInput">Hours</label>
                        <input type="number" id="hoursInput" min="0" placeholder="00">
                    </div>
                    <div class="time-field">
                        <label for="minutesInput">Minutes</label>
                        <input type="number" id="minutesInput" min="0" max="59" placeholder="00">
                    </div>
                    <div class="time-field">
                        <label for="secondsInput">Seconds</label>
                        <input type="number" id="secondsInput" min="0" max="59" placeholder="00">
                    </div>
                </div>
                <p class="input-hint">Enter hours, minutes, and seconds separately.</p>
            </div>

            <!-- Primary timer controls -->
            <div class="actions">
                <button class="start-btn" id="startBtn" type="button">Start</button>
                <button class="stop-btn" id="pauseBtn" type="button">Pause</button>
                <button class="stop-btn" id="resetBtn" type="button">Reset</button>
            </div>

            <!-- Status text such as pause or completion messages -->
            <div id="message" class="message"></div>
        </section>
    </main>

    <!-- Scripts are loaded in dependency order -->
    <script src="js/dom.js"></script>
    <script src="js/display.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
